
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti ❤️</title>
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:white;
  text-align:center;
}
.container{
  padding:50px 20px;
}
button{
  padding:15px 25px;
  border:none;
  border-radius:20px;
  background:white;
  color:#ff4b5c;
  font-size:16px;
}
.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="container">
  <h1>Todo empezó con un TikTok… 📱❤️</h1>
  <button onclick="mostrar()">Descubre nuestra historia</button>

  <div id="historia" class="hidden">
    <p>Quién diría que deslizar cambiaría todo...</p>
    <p>Me encanta lo divertida que eres 😄</p>
    <p>Gracias por este mes tan bonito ❤️</p>
    <h2>Feliz 1 mes 💕</h2>
  </div>
</div>

<script>
function mostrar(){
  document.getElementById("historia").style.display="block";
}
</script>

</body>
</html>
