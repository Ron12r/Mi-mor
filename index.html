<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti mi amor 💕</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top,#1a1a2e,#0f0f1a);
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* INTRO */
#inicio{
  position:fixed;
  width:100%;
  height:100vh;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.foto{
  width:90%;
  max-width:350px;
  border-radius:20px;
  animation:zoom 6s infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

#inicio button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
}

/* ocultar */
.ocultar{
  animation:fadeOut 1.2s forwards;
}
@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}

/* CARD */
.card{
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:20px;
  width:85%;
  margin:auto;
  margin-top:30px;
}

/* TEXTO */
#texto{
  text-align:left;
  line-height:1.6;
}

/* BOTONES */
button{
  margin-top:20px;
  padding:12px;
  border-radius:20px;
  border:none;
  background:#ff4d6d;
  color:white;
}

/* MENSAJE GRANDE */
#mensajeSorpresa{
  display:none;
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:28px;
  background:rgba(0,0,0,0.6);
  padding:15px 25px;
  border-radius:20px;
  color:#ff4d6d;
  z-index:1000;
}

/* ESTRELLAS */
.star{
  position:fixed;
  top:-10px;
  animation:fall linear infinite;
}
@keyframes fall{
  to{transform:translateY(100vh);opacity:0;}
}

/* CORAZONES */
.heart{
  position:fixed;
  animation:floatUp 1.5s forwards;
  text-shadow:0 0 10px pink;
}
@keyframes floatUp{
  to{transform:translateY(-120px);opacity:0;}
}

/* FUEGOS GRANDES */
.firework{
  position:fixed;
  font-size:32px;
  animation:explode 1.2s ease-out forwards;
  text-shadow:0 0 15px pink;
}
@keyframes explode{
  to{transform:scale(2);opacity:0;}
}

/* EXPLOSION TEXTO */
.explosion{
  position:fixed;
  color:pink;
  animation:boom 1.5s forwards;
}
@keyframes boom{
  to{transform:translateY(-150px) scale(1.5);opacity:0;}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="inicio">
  <img src="foto.jpg" class="foto">
  <button onclick="entrar()">Leer mensaje 💕</button>
</div>

<h2 id="contador"></h2>

<div class="card">
<h1>Feliz primer mes mi amor 💕</h1>

<p id="texto"></p>

<audio id="music" loop>
<source src="mi-linda-mujer.mp3" type="audio/mpeg">
</audio>

<button onclick="music.play()">🎵 Nuestra canción</button>
<button onclick="sorpresa()">⚠️ No presiones esto</button>
</div>

<div id="mensajeSorpresa">Te amo muchísimo mi niña 😍❤️</div>

<script>

/* TEXTO */
const mensaje = `En este día tan especial para nosotros quiero agradecerte una vez más por estar conmigo y por haberme aceptado como tu novio.

No sabes lo feliz que me haces. Aunque no nos veamos todo el tiempo, cada momento contigo en persona es de los más bonitos para mí. Poder hablar contigo, sentir tus abrazos, tus besos y todo lo que compartimos es un sentimiento que no puedo describir con palabras.

Te amo con todo mi corazón. Me encanta tu manera de ser conmigo, me gusta que seas dormilono ,pero mi dormilona jsjs 💖. Me encantan tus ojos, tu pelo, tus pestañas, todo de ti me gusta. Y no quiero que cambies nada, porque así tal como eres fue de la manera en que me enamoré de ti.

Jamás voy a olvidar el primer día que nos vimos en persona ,ese momento en el parque, nuestro primer abrazo y nuestro primer beso. Lo llevo guardado en mi corazón ❤️.

Me enamoré de ti antes de besarte, antes de tocarte, me enamoré cuando hablábamos todos los días por chat, cuando poco a poco nos fuimos conociendo, jugando en llamadas y compartiendo momentos juntos. Me enamoré porque sentí que eras mi persona favorita.

Conocerte fue y sigue siendo lo mejor que me ha pasado en la vida. Sé que no soy perfecto, que tengo errores, pero contigo quiero aprender y ser mejor cada día, para que nuestra relación sea cada vez más bonita.

Siempre voy a apoyarte en todo lo que quieras hacer, mi niña. Quiero seguir adelante, pero contigo a mi lado. Sé que no todo será fácil y que habrá problemas, pero los vamos a superar juntos.

Te voy a amar hasta donde tú me lo permitas, mi amor 💕.

Quiero que sepas que te amo de verdad, que contigo soy serio y te respeto, me amas tal y como soy , y eso es lo que te hace especial para mí.

Quiero vivir mil cosas contigo y esto apenas comienza ❤️`;

let i=0;

/* escribir */
function escribirTexto(){
  if(i<mensaje.length){
    let c=mensaje.charAt(i);
    texto.innerHTML += (c=="\n")?"<br><br>":c;
    i++;

    let v=40;
    if(c==",")v=120;
    if(c==".")v=250;

    setTimeout(escribirTexto,v);
  }
}

/* entrar */
function entrar(){
  inicio.classList.add("ocultar");
  music.play();
  texto.innerHTML="";
  i=0;
  escribirTexto();
}

/* contador */
function actualizarContador(){
  let inicioF=new Date("2026-03-08");
  let hoy=new Date();
  contador.innerText="Llevamos "+Math.floor((hoy-inicioF)/(1000*60*60*24))+" días juntos 💕";
}
actualizarContador();

/* CLICK INTERACTIVO */
document.addEventListener("click",e=>{
  const cosas=[
    "❤️","💖","💕","💘","💞",
    "mi niña 🥺💖",
    "mi amor 💕",
    "mi bb 🥺❤️",
    "mi dormilona 🤭💖",
    "mi mundo 🌎💖",
    "mi universo 🌌💜",
    "mi vida 💞",
    "mi todo 😍❤️",
    "te amo 💖"
  ];

  for(let i=0;i<2;i++){
    let d=document.createElement("div");
    d.className="heart";
    d.innerText=cosas[Math.floor(Math.random()*cosas.length)];
    d.style.left=(e.clientX+Math.random()*40-20)+"px";
    d.style.top=(e.clientY+Math.random()*40-20)+"px";
    d.style.fontSize=(22+Math.random()*10)+"px";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),1500);
  }
});

/* ESTRELLAS + TEXTO */
setInterval(()=>{
  let s=document.createElement("div");
  s.className="star";
  s.innerText=["✨","💖","Te amo","mi amor","💘","mi vida"][Math.floor(Math.random()*6)];
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration="5s";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),5000);
},400);

/* FUEGOS AUTOMÁTICOS */
setInterval(()=>{
  let f=document.createElement("div");
  f.className="firework";
  f.innerText=["🎆","✨","💖","💫"][Math.floor(Math.random()*4)];
  f.style.left=Math.random()*100+"vw";
  f.style.top=Math.random()*100+"vh";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1200);
},3000);

/* SORPRESA FULL */
function sorpresa(){
  mensajeSorpresa.style.display="block";

  if(navigator.vibrate) navigator.vibrate([200,100,200]);

  // pantalla llena de TE AMO
  for(let i=0;i<80;i++){
    let t=document.createElement("div");
    t.className="explosion";
    t.innerText="Te amo 💖";
    t.style.left=Math.random()*100+"vw";
    t.style.top=Math.random()*100+"vh";
    t.style.fontSize=(20+Math.random()*20)+"px";
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),1500);
  }

  // fuegos
  for(let i=0;i<30;i++){
    let f=document.createElement("div");
    f.className="firework";
    f.innerText=["🎆","✨","💖","💫"][Math.floor(Math.random()*4)];
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1200);
  }

  setTimeout(()=>mensajeSorpresa.style.display="none",4000);
}
</script>

</body>
</html>
