<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti Kristel 💕</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
  overflow-x:hidden;
}

/* ESTRELLAS */
.estrella{
  position:fixed;
  width:2px;
  height:2px;
  background:white;
  animation:parpadeo 2s infinite;
}

@keyframes parpadeo{
  50%{opacity:0.3;}
}

/* INICIO */
#inicio{
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:999;
  overflow:hidden;
}

/* FOTO */
.foto{
  width:95%;
  max-width:320px;
  border-radius:20px;
  z-index:2;
  margin-bottom:10px;
}

/* DIBUJOS */
.dibujoInicio{
  position:absolute;
  z-index:1;
  animation:flotar 5s ease-in-out infinite alternate;
  cursor:pointer;
}

@keyframes flotar{
  from{transform:translateY(0);}
  to{transform:translateY(-25px);}
}

/* BOTÓN */
button{
  padding:12px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  margin-top:10px;
}

/* TEXTO */
#texto{
  width:85%;
  margin:auto;
  text-align:left;
  line-height:1.6;
}

/* EXPLOSION */
.explosion{
  position:fixed;
  color:#ff4d6d;
  font-size:24px;
  animation:boom 1s forwards;
}

@keyframes boom{
  to{transform:translate(var(--x),var(--y));opacity:0;}
}

/* OCULTAR */
.ocultar{
  animation:fade 1s forwards;
}
@keyframes fade{
  to{opacity:0;visibility:hidden;}
}
</style>
</head>

<body>

<div id="inicio">
  <img src="foto.jpg" class="foto">
  <h2>Para ti Kristel 💕</h2>
  <button onclick="entrar()">Leer mensaje 💖</button>
</div>

<h2 id="contador"></h2>
<p id="texto"></p>

<audio id="music" loop>
<source src="mi-linda-mujer.mp3">
</audio>

<button onclick="music.play()">🎵 Música</button>
<button onclick="sorpresa()">💥 Sorpresa</button>

<script>

/* ⭐ ESTRELLAS */
for(let i=0;i<80;i++){
  let e=document.createElement("div");
  e.className="estrella";
  e.style.left=Math.random()*100+"vw";
  e.style.top=Math.random()*100+"vh";
  document.body.appendChild(e);
}

/* FRASES */
const frases=["Te amo 💖","Mi niña 💕","Mi vida 💞","Mi todo 😍"];

/* VENTANA */
function efectoClick(){
  alert(frases[Math.floor(Math.random()*frases.length)]);
}

/* IMÁGENES */
const imagenes=[
"snoopy1.png","snoopy2.png","snoopy3.png",
"dibujo1.png","dibujo2.png","dibujo3.png"
];

/* 🔥 CÍRCULO MÁS GRANDE */
const centroX = window.innerWidth/2;
const centroY = window.innerHeight/2;
const radio = 240; // MÁS ALEJADO

imagenes.forEach((src,i)=>{
  let angulo = (i/imagenes.length)*(2*Math.PI);

  let x = centroX + radio*Math.cos(angulo);
  let y = centroY + radio*Math.sin(angulo);

  let img=document.createElement("img");
  img.src=src;
  img.className="dibujoInicio";

  img.style.left=(x-60)+"px";
  img.style.top=(y-60)+"px";
  img.style.width="130px"; // MÁS GRANDE

  img.onclick=efectoClick;

  document.getElementById("inicio").appendChild(img);
});

/* MENSAJE COMPLETO */
const mensaje=`Feliz primer mes de novios, mi amor 💕

En este día tan especial para nosotros quiero agradecerte una vez más por estar conmigo y por haberme aceptado como tu novio.

No sabes lo feliz que me haces. Aunque no nos veamos todo el tiempo, cada momento contigo en persona es de los más bonitos para mí. Poder hablar contigo, sentir tus abrazos, tus besos y todo lo que compartimos es un sentimiento que no puedo describir con palabras.

Te amo con todo mi corazón. Me encanta tu manera de ser conmigo, me gusta que seas dormilona, pero mi dormilona jsjs 💖. Me encantan tus ojos, tu pelo, tus pestañas, todo de ti me gusta. Y no quiero que cambies nada, porque así tal como eres fue de la manera en que me enamoré de ti.

Jamás voy a olvidar el primer día que nos vimos en persona, ese momento en el parque, nuestro primer abrazo y nuestro primer beso. Lo llevo guardado en mi corazón ❤️.

Me enamoré de ti antes de besarte, antes de tocarte, me enamoré cuando hablábamos todos los días por chat, cuando poco a poco nos fuimos conociendo, jugando en llamadas y compartiendo momentos juntos. Me enamoré porque sentí que eras mi persona favorita.

Conocerte fue y sigue siendo lo mejor que me ha pasado en la vida. Sé que no soy perfecto, que tengo errores, pero contigo quiero aprender y ser mejor cada día, para que nuestra relación sea cada vez más bonita.

Siempre voy a apoyarte en todo lo que quieras hacer, mi niña. Quiero seguir adelante, pero contigo a mi lado. Sé que no todo será fácil y que habrá problemas, pero los vamos a superar juntos.

Te voy a amar hasta donde tú me lo permitas, mi amor 💕.

Quiero que sepas que te amo de verdad, que contigo soy serio y te respeto, me amas tal y como soy, y eso es lo que te hace especial para mí.

Quiero vivir mil cosas contigo y esto apenas comienza ❤️`;

let i=0;
function escribir(){
  if(i<mensaje.length){
    document.getElementById("texto").innerHTML+=mensaje[i]=="\n"?"<br><br>":mensaje[i];
    i++;
    setTimeout(escribir,40);
  }
}

/* ENTRAR */
function entrar(){
  document.getElementById("inicio").classList.add("ocultar");
  document.querySelectorAll(".dibujoInicio").forEach(e=>e.remove());
  escribir();
  music.play();
}

/* CONTADOR */
setInterval(()=>{
  let d=Math.floor((new Date()-new Date("2026-03-08"))/(1000*60*60*24));
  contador.innerText="Llevamos "+d+" días juntos 💕";
},1000);

/* SORPRESA */
function sorpresa(){
  for(let i=0;i<50;i++){
    let e=document.createElement("div");
    e.className="explosion";
    e.innerText="TE AMO 💖";
    e.style.left=window.innerWidth/2+"px";
    e.style.top=window.innerHeight/2+"px";
    e.style.setProperty("--x",(Math.random()*400-200)+"px");
    e.style.setProperty("--y",(Math.random()*400-200)+"px");
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),1000);
  }
}

</script>

</body>
</html>
