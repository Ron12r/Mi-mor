  <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti mi amor 💕</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color: white;
  text-align: center;
}

/* INTRO */
#inicio {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.foto {
  width: 90%;
  max-width: 350px;
  border-radius: 20px;
  animation: zoom 6s infinite alternate;
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

#inicio button {
  margin-top: 20px;
  padding: 12px 20px;
  border-radius: 20px;
  border: none;
  background: #ff4d6d;
  color: white;
}

/* OCULTAR INTRO */
.ocultar {
  animation: fadeOut 1.2s forwards;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

/* CONTENIDO */
.card {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 20px;
  width: 85%;
  margin: auto;
  margin-top: 30px;
}

/* TEXTO */
.texto {
  text-align: left;
  line-height: 1.6;
}

/* BOTONES */
button {
  margin-top: 20px;
  padding: 12px;
  border-radius: 20px;
  border: none;
  background: #ff4d6d;
  color: white;
}

/* SORPRESA */
#mensajeSorpresa {
  display: none;
  margin-top: 15px;
}

/* ESTRELLAS */
.star {
  position: fixed;
  top: -10px;
  color: #ff4d6d;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
    opacity: 0;
  }
}

/* CORAZONES */
.heart {
  position: fixed;
  animation: floatUp 1s forwards;
}

@keyframes floatUp {
  to {
    transform: translateY(-100px);
    opacity: 0;
  }
}

/* EXPLOSION */
.explosion {
  position: fixed;
  font-size: 18px;
  color: pink;
  animation: boom 1s forwards;
}

@keyframes boom {
  to {
    transform: translateY(-150px) scale(1.5);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="inicio">
  <img src="foto.jpg" class="foto">
  <button onclick="entrar()">Leer mensaje 💕</button>
</div>

<!-- CONTADOR -->
<h2 id="contador"></h2>

<!-- CONTENIDO -->
<div class="card">
<h1>Feliz primer mes mi amor 💕</h1>

<p id="texto"></p>

<audio id="music" loop>
<source src="mi-linda-mujer.mp3" type="audio/mpeg">
</audio>

<button onclick="document.getElementById('music').play()">🎵 Nuestra canción</button>

<button onclick="sorpresa()">⚠️ No presiones esto</button>

<p id="mensajeSorpresa">Te amo muchicimoo mi niña  😍❤️</p>

</div>

<script>

/* MENSAJE */
const mensaje = `Feliz primer mes de novios, mi amor 💕

En este día tan especial para nosotros quiero agradecerte una vez más por estar conmigo y por haberme aceptado como tu novio.

No sabes lo feliz que me haces. Aunque no nos veamos todo el tiempo, cada momento contigo en persona es de los más bonitos para mí. Poder hablar contigo, sentir tus abrazos, tus besos y todo lo que compartimos es un sentimiento que no puedo describir con palabras.

Te amo con todo mi corazón. Me encanta tu manera de ser conmigo, me gusta que seas dormilono ,pero mi dormilona jsjs 💖. Me encantan tus ojos, tu pelo, tus pestañas, todo de ti me gusta. Y no quiero que cambies nada, porque así tal como eres fue de la manera en que me enamoré de ti.

Jamás voy a olvidar el primer día que nos vimos en persona ,ese momento en el parque, nuestro primer abrazo y nuestro primer beso. Lo llevo guardado en mi corazón ❤️.

Me enamoré de ti antes de besarte, antes de tocarte, me enamoré cuando hablábamos todos los días por chat, cuando poco a poco nos fuimos conociendo, jugando en llamadas y compartiendo momentos juntos. Me enamoré porque sentí que eras mi persona favorita.

Conocerte fue y sigue siendo lo mejor que me ha pasado en la vida. Sé que no soy perfecto, que tengo errores, pero contigo quiero aprender y ser mejor cada día, para que nuestra relación sea cada vez más bonita.

Siempre voy a apoyarte en todo lo que quieras hacer, mi niña. Quiero seguir adelante, pero contigo a mi lado. Sé que no todo será fácil y que habrá problemas, pero los vamos a superar juntos.

Te voy a amar hasta donde tú me lo permitas, mi amor 💕.

Quiero que sepas que te amo de verdad, que contigo soy serio y te respeto, me amas tal y como soy , y eso es lo que te hace especial para mí.

Quiero vivir mil cosas contigo y esto apenas comienza ❤️`;

let i = 0;

function escribirTexto() {
  if (i < mensaje.length) {
    document.getElementById("texto").innerHTML +=
      mensaje.charAt(i) === "\n" ? "<br><br>" : mensaje.charAt(i);
    i++;
    setTimeout(escribirTexto, 60);
  }
}

/* INTRO */
function entrar() {
  document.getElementById("inicio").classList.add("ocultar");
  document.getElementById("music").play();
  escribirTexto();
}

/* CONTADOR */
function actualizarContador() {
  const inicio = new Date("2026-03-08");
  const hoy = new Date();
  const dias = Math.floor((hoy - inicio) / (1000*60*60*24));
  document.getElementById("contador").innerText =
    "Llevamos " + dias + " días juntos 💕";
}
actualizarContador();

/* SORPRESA PRO */
function sorpresa() {
  document.getElementById("mensajeSorpresa").style.display = "block";

  // vibración (si el celular lo permite)
  if (navigator.vibrate) {
    navigator.vibrate([200,100,200]);
  }

  // explosión de "te amo"
  for (let i = 0; i < 20; i++) {
    let e = document.createElement("div");
    e.className = "explosion";
    e.innerText = "Te amo 💖";
    e.style.left = Math.random()*100 + "vw";
    e.style.top = Math.random()*100 + "vh";
    document.body.appendChild(e);

    setTimeout(()=> e.remove(),1000);
  }
}

/* ESTRELLAS */
function crearEstrella() {
  const e = document.createElement("div");
  e.className = "star";
  const t = ["✨","💖","Te amo"];
  e.innerText = t[Math.floor(Math.random()*t.length)];
  e.style.left = Math.random()*100 + "vw";
  e.style.animationDuration = (3 + Math.random()*5) + "s";
  document.body.appendChild(e);
  setTimeout(()=> e.remove(),8000);
}
setInterval(crearEstrella,300);

/* CORAZONES */
document.addEventListener("click", function(e){
  const h = document.createElement("div");
  h.className = "heart";
  h.innerText = "❤️";
  h.style.left = e.clientX + "px";
  h.style.top = e.clientY + "px";
  document.body.appendChild(h);
  setTimeout(()=> h.remove(),1000);
});

</script>

</body>
</html>
