<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti mi amor 💕</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* INTRO */
#inicio{
  position:fixed;
  width:100%;
  height:100vh;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.foto{
  width:90%;
  max-width:300px;
  border-radius:20px;
  cursor:pointer;
}

.ocultar{
  animation:fade 1s forwards;
}
@keyframes fade{
  to{opacity:0;visibility:hidden;}
}

/* TEXTO */
#texto{
  text-align:left;
  width:85%;
  margin:auto;
  line-height:1.6;
}

/* BOTONES */
button{
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
}

/* ESTRELLAS */
.star{
  position:fixed;
  width:2px;
  height:2px;
  background:white;
}

/* LLUVIA */
.rain{
  position:fixed;
  top:-20px;
  animation:fall linear forwards;
}
@keyframes fall{
  to{transform:translateY(110vh);opacity:0;}
}

/* IMÁGENES */
.imgFall{
  position:fixed;
  top:-60px;
  pointer-events:auto;
  animation:fall linear forwards;
}

/* CORAZONES */
.heart{
  position:fixed;
  animation:floatUp 1.2s forwards;
}
@keyframes floatUp{
  to{transform:translateY(-100px);opacity:0;}
}

/* EXPLOSIÓN */
.explosion{
  position:fixed;
  font-size:22px;
  color:#ff4d6d;
  animation:boom 1s forwards;
}
@keyframes boom{
  to{transform:translate(var(--x),var(--y));opacity:0;}
}

/* FUEGOS */
.fire{
  position:fixed;
  font-size:26px;
  animation:boom 1s forwards;
}
</style>
</head>

<body>

<div id="inicio">
  <img src="foto.jpg" class="foto" id="fotoInicio">
  <h2>Para ti mi amor 💕</h2>
  <button onclick="entrar()">Leer mensaje 💖</button>
</div>

<h2 id="contador"></h2>

<p id="texto"></p>

<audio id="music" loop>
<source src="mi-linda-mujer.mp3">
</audio>

<button onclick="music.play()">🎵 Música</button>
<button onclick="sorpresa()">💥 Sorpresa</button>

<script>

/* FOTO CAMBIA */
const fotos=["foto.jpg","foto2.jpg","foto3.jpg"];
let f=0;
fotoInicio.onclick=()=>{
  f=(f+1)%fotos.length;
  fotoInicio.src=fotos[f];
};

/* TEXTO */
const mensaje=`En este día tan especial para nosotros quiero agradecerte una vez más por estar conmigo y por haberme aceptado como tu novio.

No sabes lo feliz que me haces. Aunque no nos veamos todo el tiempo, cada momento contigo en persona es de los más bonitos para mí. Poder hablar contigo, sentir tus abrazos, tus besos y todo lo que compartimos es un sentimiento que no puedo describir con palabras.

Te amo con todo mi corazón. Me encanta tu manera de ser conmigo, me gusta que seas dormilono, pero mi dormilona jsjs 💖. Me encantan tus ojos, tu pelo, tus pestañas, todo de ti me gusta. Y no quiero que cambies nada, porque así tal como eres fue de la manera en que me enamoré de ti.

Jamás voy a olvidar el primer día que nos vimos en persona, ese momento en el parque, nuestro primer abrazo y nuestro primer beso. Lo llevo guardado en mi corazón ❤️.

Me enamoré de ti antes de besarte, antes de tocarte, me enamoré cuando hablábamos todos los días por chat, cuando poco a poco nos fuimos conociendo, jugando en llamadas y compartiendo momentos juntos. Me enamoré porque sentí que eras mi persona favorita.

Conocerte fue y sigue siendo lo mejor que me ha pasado en la vida. Sé que no soy perfecto, que tengo errores, pero contigo quiero aprender y ser mejor cada día.

Siempre voy a apoyarte en todo lo que quieras hacer, mi niña.

Te voy a amar hasta donde tú me lo permitas 💕.

Quiero vivir mil cosas contigo y esto apenas comienza ❤️`;

let i=0;
function escribir(){
  if(i<mensaje.length){
    texto.innerHTML+=mensaje[i]=="\n"?"<br><br>":mensaje[i];
    i++;
    setTimeout(escribir,40);
  }
}

function entrar(){
  inicio.classList.add("ocultar");
  music.play();
  escribir();
}

/* CONTADOR */
setInterval(()=>{
  let d=Math.floor((new Date()-new Date("2026-03-08"))/(1000*60*60*24));
  contador.innerText="Llevamos "+d+" días 💕";
},1000);

/* FRASES */
const frases=[
"Te amo 💖","Mi niña 💖","Mi amor 💕","Mi bb ❤️","Mi dormilona 🤭💖",
"Mi mundo 🌎","Mi universo 🌌","Mi vida 💞","Mi todo 😍",
"Contigo todo es mejor ✨","Eres mi lugar favorito 🥺","Te elegiría siempre 💘"
];

/* IMÁGENES */
const imagenes=[
"snoopy1.png","snoopy2.png","snoopy3.png",
"dibujo1.png","dibujo2.png","dibujo3.png"
];

setInterval(()=>{
  let img=document.createElement("img");
  let tipo=imagenes[Math.floor(Math.random()*imagenes.length)];
  img.src=tipo;
  img.className="imgFall";
  img.style.left=Math.random()*100+"vw";
  img.style.animationDuration=(4+Math.random()*3)+"s";
  img.style.width=(40+Math.random()*30)+"px";

  img.onclick=(e)=>{
    if(navigator.vibrate) navigator.vibrate([80,40,80]);

    let t=document.createElement("div");
    t.innerText=frases[Math.floor(Math.random()*frases.length)];
    t.style.position="fixed";
    t.style.left=e.clientX+"px";
    t.style.top=e.clientY+"px";
    t.style.color="#ff4d6d";
    t.style.animation="floatUp 1.2s forwards";

    document.body.appendChild(t);
    setTimeout(()=>t.remove(),1200);

    for(let i=0;i<5;i++){
      let h=document.createElement("div");
      h.innerText="💖";
      h.className="heart";
      h.style.left=e.clientX+"px";
      h.style.top=e.clientY+"px";
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),1000);
    }
  };

  document.body.appendChild(img);
  setTimeout(()=>img.remove(),7000);
},900);

/* ESTRELLAS */
for(let i=0;i<120;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  document.body.appendChild(s);
}

/* LLUVIA */
setInterval(()=>{
  let r=document.createElement("div");
  r.className="rain";
  r.innerText=Math.random()>0.5?"Te amo 💖":"✨";
  r.style.left=Math.random()*100+"vw";
  r.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),6000);
},300);

/* FUEGOS */
setInterval(()=>{
  let f=document.createElement("div");
  f.className="fire";
  f.innerText=["🎆","✨","💖"][Math.floor(Math.random()*3)];
  f.style.left=Math.random()*100+"vw";
  f.style.top=Math.random()*100+"vh";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
},2500);

/* SORPRESA */
function sorpresa(){
  if(navigator.vibrate) navigator.vibrate([200,100,200]);

  for(let i=0;i<40;i++){
    let e=document.createElement("div");
    e.className="explosion";
    e.innerText="TE AMO 💖";
    e.style.left=window.innerWidth/2+"px";
    e.style.top=window.innerHeight/2+"px";
    e.style.setProperty("--x",(Math.random()*300-150)+"px");
    e.style.setProperty("--y",(Math.random()*300-150)+"px");
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),1000);
  }
}

</script>

</body>
</html>
