<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti mi amor 💕</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle,#1a1a2e,#0f0f1a);
  color:white;
  text-align:center;
  overflow:hidden;
}

/* INTRO */
#inicio{
  position:fixed;
  width:100%;
  height:100vh;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.foto{
  width:90%;
  max-width:350px;
  border-radius:20px;
  animation:zoom 6s infinite alternate;
  cursor:pointer;
}

@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

.tituloInicio{
  color:#ff4d6d;
  font-size:28px;
  margin-top:20px;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.ocultar{
  animation:fadeZoom 1.2s forwards;
}
@keyframes fadeZoom{
  to{opacity:0;transform:scale(1.2);visibility:hidden;}
}

/* CARD */
.card{
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:20px;
  width:85%;
  margin:auto;
  margin-top:30px;
}

/* TEXTO */
#texto{
  text-align:left;
  line-height:1.6;
  text-shadow:0 0 5px pink;
}

/* BOTONES */
button{
  margin-top:20px;
  padding:12px;
  border-radius:20px;
  border:none;
  background:#ff4d6d;
  color:white;
}

/* LLUVIA */
.rain{
  position:fixed;
  top:-20px;
  font-size:14px;
  animation:fall linear forwards;
}
@keyframes fall{
  to{transform:translateY(110vh);opacity:0;}
}

/* CORAZONES */
.heart{
  position:fixed;
  animation:floatUp 1.3s forwards;
}
@keyframes floatUp{
  to{transform:translateY(-120px);opacity:0;}
}

/* EXPLOSION */
.explosion{
  position:fixed;
  font-weight:bold;
  color:#ff4d6d;
  animation:boom 1s ease-out forwards;
}
@keyframes boom{
  to{transform:translate(var(--x),var(--y)) scale(1.5);opacity:0;}
}

/* FUEGOS */
.firework{
  position:fixed;
  font-size:28px;
  animation:explode 1s forwards;
}
@keyframes explode{
  to{transform:scale(1.8);opacity:0;}
}
</style>
</head>

<body>

<div id="inicio">
  <img src="foto.jpg" class="foto" id="fotoInicio">
  <h1 class="tituloInicio">Para ti mi amor 💕</h1>
  <button onclick="entrar()">Leer mensaje 💕</button>
</div>

<h2 id="contador"></h2>

<div class="card">
<h1>Feliz primer mes mi amor 💕</h1>
<p id="texto"></p>

<audio id="music" loop>
<source src="mi-linda-mujer.mp3">
</audio>

<audio id="clickSound">
<source src="click.mp3">
</audio>

<button onclick="music.play()">🎵 Nuestra canción</button>
<button onclick="sorpresa()">💥 Sorpresa</button>
</div>

<script>

/* FOTO */
const fotos=["foto.jpg","foto2.jpg","foto3.jpg"];
let index=0;
fotoInicio.onclick=()=>{
  index=(index+1)%fotos.length;
  fotoInicio.src=fotos[index];
  clickSound.play();
};

/* TEXTO COMPLETO */
const mensaje=`En este día tan especial para nosotros quiero agradecerte una vez más por estar conmigo y por haberme aceptado como tu novio.

No sabes lo feliz que me haces. Aunque no nos veamos todo el tiempo, cada momento contigo en persona es de los más bonitos para mí. Poder hablar contigo, sentir tus abrazos, tus besos y todo lo que compartimos es un sentimiento que no puedo describir con palabras.

Te amo con todo mi corazón. Me encanta tu manera de ser conmigo, me gusta que seas dormilono, pero mi dormilona jsjs 💖. Me encantan tus ojos, tu pelo, tus pestañas, todo de ti me gusta. Y no quiero que cambies nada, porque así tal como eres fue de la manera en que me enamoré de ti.

Jamás voy a olvidar el primer día que nos vimos en persona, ese momento en el parque, nuestro primer abrazo y nuestro primer beso. Lo llevo guardado en mi corazón ❤️.

Me enamoré de ti antes de besarte, antes de tocarte, me enamoré cuando hablábamos todos los días por chat, cuando poco a poco nos fuimos conociendo, jugando en llamadas y compartiendo momentos juntos. Me enamoré porque sentí que eras mi persona favorita.

Conocerte fue y sigue siendo lo mejor que me ha pasado en la vida. Sé que no soy perfecto, que tengo errores, pero contigo quiero aprender y ser mejor cada día, para que nuestra relación sea cada vez más bonita.

Siempre voy a apoyarte en todo lo que quieras hacer, mi niña. Quiero seguir adelante, pero contigo a mi lado. Sé que no todo será fácil y que habrá problemas, pero los vamos a superar juntos.

Te voy a amar hasta donde tú me lo permitas, mi amor 💕.

Quiero que sepas que te amo de verdad, que contigo soy serio y te respeto, me amas tal y como soy, y eso es lo que te hace especial para mí.

Quiero vivir mil cosas contigo y esto apenas comienza ❤️`;

let i=0;
function escribirTexto(){
  if(i<mensaje.length){
    let c=mensaje.charAt(i);
    texto.innerHTML+=(c=="\n")?"<br><br>":c;
    i++;
    setTimeout(escribirTexto,40);
  }
}

function entrar(){
  inicio.classList.add("ocultar");
  music.play();
  escribirTexto();
}

/* CONTADOR */
setInterval(()=>{
  let inicioF=new Date("2026-03-08");
  let hoy=new Date();
  contador.innerText="Llevamos "+Math.floor((hoy-inicioF)/(1000*60*60*24))+" días 💕";
},1000);

/* INTERACCION */
document.addEventListener("click", e=>{
  const cosas=[
    "❤️","💖","💕",
    "mi niña 🥺💖","mi amor 💕","mi bb ❤️",
    "mi dormilona 🤭💖","mi mundo 🌎",
    "mi universo 🌌","mi vida 💞","mi todo 😍"
  ];

  let d=document.createElement("div");
  d.className="heart";
  d.innerText=cosas[Math.floor(Math.random()*cosas.length)];
  d.style.left=e.clientX+"px";
  d.style.top=e.clientY+"px";
  d.style.fontSize="22px";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1300);
});

/* SORPRESA */
function sorpresa(){
  if(navigator.vibrate){
    navigator.vibrate([200,100,200]);
  }

  for(let i=0;i<40;i++){
    let t=document.createElement("div");
    t.className="explosion";
    t.innerText="TE AMO 💖";

    t.style.left=window.innerWidth/2+"px";
    t.style.top=window.innerHeight/2+"px";

    t.style.setProperty("--x",(Math.random()*300-150)+"px");
    t.style.setProperty("--y",(Math.random()*300-150)+"px");

    document.body.appendChild(t);
    setTimeout(()=>t.remove(),1000);
  }
}

/* LLUVIA */
setInterval(()=>{
  let r=document.createElement("div");
  r.className="rain";
  r.innerText=Math.random()>0.5?"Te amo 💖":"✨";
  r.style.left=Math.random()*100+"vw";
  r.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),6000);
},200);

/* FUEGOS */
setInterval(()=>{
  let f=document.createElement("div");
  f.className="firework";
  f.innerText=["🎆","💖","✨"][Math.floor(Math.random()*3)];
  f.style.left=Math.random()*100+"vw";
  f.style.top=Math.random()*100+"vh";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
},2500);

</script>

</body>
</html>
