<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti mi amor 💕</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* INTRO */
#inicio {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.foto {
  width: 90%;
  max-width: 350px;
  border-radius: 20px;
  animation: zoom 6s infinite alternate;
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

#inicio button {
  margin-top: 20px;
  padding: 12px 20px;
  border-radius: 20px;
  border: none;
  background: #ff4d6d;
  color: white;
}

/* OCULTAR INTRO */
.ocultar {
  animation: fadeOut 1.2s forwards;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

/* CONTENIDO */
.card {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 20px;
  width: 85%;
  margin: auto;
  margin-top: 30px;
}

/* TEXTO */
#texto {
  text-align: left;
  line-height: 1.6;
  min-height: 200px;
}

/* BOTONES */
button {
  margin-top: 20px;
  padding: 12px;
  border-radius: 20px;
  border: none;
  background: #ff4d6d;
  color: white;
}

/* MENSAJE GRANDE ABAJO */
#mensajeSorpresa {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  font-weight: bold;
  background: rgba(0,0,0,0.6);
  padding: 15px 25px;
  border-radius: 20px;
  color: #ff4d6d;
  box-shadow: 0 0 20px #ff4d6d;
  z-index: 1000;
}

/* ESTRELLAS */
.star {
  position: fixed;
  top: -10px;
  color: #ff4d6d;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
    opacity: 0;
  }
}

/* CORAZONES + TEXTO */
.heart {
  position: fixed;
  font-size: 26px;
  animation: floatUp 1.5s ease forwards;
  pointer-events: none;
  text-shadow: 0 0 10px pink;
}

@keyframes floatUp {
  to {
    transform: translateY(-120px);
    opacity: 0;
  }
}

/* EXPLOSION */
.explosion {
  position: fixed;
  font-size: 18px;
  color: pink;
  animation: boom 1s forwards;
}

@keyframes boom {
  to {
    transform: translateY(-150px) scale(1.5);
    opacity: 0;
  }
}

/* FUEGOS ARTIFICIALES */
.firework {
  position: fixed;
  font-size: 20px;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  from { transform: scale(0.5); opacity: 1; }
  to { transform: scale(2); opacity: 0; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="inicio">
  <img src="foto.jpg" class="foto">
  <button onclick="entrar()">Leer mensaje 💕</button>
</div>

<!-- CONTADOR -->
<h2 id="contador"></h2>

<!-- CONTENIDO -->
<div class="card">
<h1>Feliz primer mes mi amor 💕</h1>

<p id="texto"></p>

<audio id="music" loop>
<source src="mi-linda-mujer.mp3" type="audio/mpeg">
</audio>

<button onclick="document.getElementById('music').play()">🎵 Nuestra canción</button>
<button onclick="sorpresa()">⚠️ No presiones esto</button>

</div>

<div id="mensajeSorpresa">Te amo muchísimo mi niña 😍❤️</div>

<script>

/* MENSAJE */
const mensaje = `Feliz primer mes de novios, mi amor 💕

... (tu texto completo aquí) ...`;

let i = 0;

/* TEXTO ROMÁNTICO */
function escribirTexto() {
  if (i < mensaje.length) {
    let char = mensaje.charAt(i);

    if (char === "\n") {
      texto.innerHTML += "<br><br>";
    } else {
      texto.innerHTML += char;
    }

    i++;

    let velocidad = 40;
    if (char === ",") velocidad = 120;
    if (char === ".") velocidad = 250;

    setTimeout(escribirTexto, velocidad);
  }
}

/* ENTRAR */
function entrar() {
  inicio.classList.add("ocultar");
  music.play();
  texto.innerHTML = "";
  i = 0;
  escribirTexto();
}

/* CONTADOR */
function actualizarContador() {
  const inicioFecha = new Date("2026-03-08");
  const hoy = new Date();
  const dias = Math.floor((hoy - inicioFecha) / (1000*60*60*24));
  contador.innerText = "Llevamos " + dias + " días juntos 💕";
}
actualizarContador();

/* CLICK CORAZONES + FRASES */
document.addEventListener("click", function(e){

  const cosas = [
    "❤️","💖","💕","💘",
    "mi niña linda 💕",
    "mi princesa 👑",
    "mi dormilona 😴💖",
    "mi bb 🥺❤️",
    "mi mundo 🌎💖",
    "mi amor 💕"
  ];

  let item = document.createElement("div");
  item.className = "heart";
  item.innerText = cosas[Math.floor(Math.random()*cosas.length)];

  item.style.left = e.clientX + "px";
  item.style.top = e.clientY + "px";

  document.body.appendChild(item);
  setTimeout(()=> item.remove(),1500);
});

/* ESTRELLAS */
function crearEstrella() {
  const e = document.createElement("div");
  e.className = "star";
  const t = ["✨","💖","Te amo","mi amor","💘"];
  e.innerText = t[Math.floor(Math.random()*t.length)];
  e.style.left = Math.random()*100 + "vw";
  e.style.animationDuration = (3 + Math.random()*5) + "s";
  document.body.appendChild(e);
  setTimeout(()=> e.remove(),8000);
}
setInterval(crearEstrella,300);

/* FUEGOS ARTIFICIALES */
function fuegosArtificiales() {
  for (let i = 0; i < 25; i++) {
    let f = document.createElement("div");
    f.className = "firework";
    f.innerText = ["✨","💖","💫","🎆"][Math.floor(Math.random()*4)];
    f.style.left = Math.random()*100 + "vw";
    f.style.top = Math.random()*100 + "vh";
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 1000);
  }
}

/* SORPRESA */
function sorpresa() {
  mensajeSorpresa.style.display = "block";

  if (navigator.vibrate) {
    navigator.vibrate([200,100,200]);
  }

  fuegosArtificiales();

  setTimeout(() => {
    mensajeSorpresa.style.display = "none";
  }, 4000);
}

</script>

</body>
</html>
